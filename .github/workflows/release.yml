name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate CHANGELOG.md
        run: git-cliff --output CHANGELOG.md

      - name: Commit updated CHANGELOG.md
        run: |
          git config user.name "TTlab"
          git config user.email "info@ttlab.it"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore(release): update CHANGELOG.md for ${GITHUB_REF_NAME}"
          git push origin HEAD:main

  build-deb:
    name: Build .deb (Debian/Ubuntu)
    runs-on: ubuntu-latest
    needs: changelog

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper nodejs npm

      - name: Build .deb package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "1s/([^)]*)/($VERSION-1)/" debian/changelog
          dpkg-buildpackage -us -uc -b
          # dpkg-buildpackage outputs to parent dir — copy into workspace
          mkdir -p packages
          cp ../cockpit-wifi_*.deb packages/

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: packages/*.deb
          retention-days: 7

  build-rpm:
    name: Build .rpm (Fedora/RHEL)
    runs-on: ubuntu-latest
    needs: changelog
    container: fedora:latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install build dependencies
        run: dnf install -y rpmdevtools nodejs npm make git

      - name: Setup rpmbuild tree
        run: rpmdev-setuptree

      - name: Build .rpm package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # RPM non accetta '-' nella Version — converte 0.1.1-beta.1 in:
          #   Version: 0.1.1  Release: 0.beta.1.1
          BASE_VERSION="${VERSION%%-*}"
          PRE_RELEASE="${VERSION#*-}"
          if [ "$BASE_VERSION" != "$VERSION" ]; then
            RPM_RELEASE="0.${PRE_RELEASE}.1"
          else
            BASE_VERSION="$VERSION"
            RPM_RELEASE="1"
          fi
          sed -i "s/^Version:.*/Version:        ${BASE_VERSION}/" packaging/rpm/cockpit-wifi.spec
          sed -i "s/^Release:.*/Release:        ${RPM_RELEASE}%{?dist}/" packaging/rpm/cockpit-wifi.spec
          npm ci
          make pkg/lib
          NODE_ENV=production node build.js
          # Build tarball: cockpit-wifi-BASE_VERSION/
          #   cockpit/  <- pre-built plugin files (what goes in /usr/share/cockpit/wifi/)
          #   LICENSE, README.md, CHANGELOG.md
          SRCDIR="cockpit-wifi-${BASE_VERSION}"
          mkdir -p "/tmp/${SRCDIR}/cockpit"
          cp -r dist/* "/tmp/${SRCDIR}/cockpit/"
          cp LICENSE README.md CHANGELOG.md "/tmp/${SRCDIR}/"
          tar czf "$HOME/rpmbuild/SOURCES/cockpit-wifi-${BASE_VERSION}.tar.gz" \
            -C /tmp "${SRCDIR}/"
          sed -i "s/^Source0:.*/Source0:        %{name}-${BASE_VERSION}.tar.gz/" packaging/rpm/cockpit-wifi.spec
          rpmbuild -bb packaging/rpm/cockpit-wifi.spec
          # Copy output to workspace for upload
          mkdir -p packages
          cp "$HOME/rpmbuild/RPMS/noarch/cockpit-wifi-"*.rpm packages/

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: packages/*.rpm
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-deb, build-rpm]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git-cliff to find the tag

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate release notes for this tag
        run: |
          git-cliff --latest --strip header > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: dist-packages/

      - name: Download .rpm artifact
        uses: actions/download-artifact@v4
        with:
          name: rpm-package
          path: dist-packages/

      - name: List packages to release
        run: ls -lh dist-packages/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-packages/*
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
