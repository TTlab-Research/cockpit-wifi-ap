name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Cockpit shared libraries
        run: make pkg/lib

      - name: Build
        run: NODE_ENV=production node build.js

      - name: Lint (ESLint)
        run: npm run eslint

      - name: Lint (Stylelint)
        run: npm run stylelint
